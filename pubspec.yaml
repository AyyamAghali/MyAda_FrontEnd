name: ada_front
description: ADA University Lost & Found, Club Management, and IT Support App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  intl: ^0.19.0
  image_picker: ^1.0.5
  url_launcher: ^6.2.2
  shared_preferences: ^2.2.2
  http: ^1.2.0
  http_parser: ^4.0.2
  mobile_scanner: ^7.2.0
  signalr_netcore: ^1.4.4
  flutter_webrtc: ^1.4.1
  permission_handler: ^12.0.1
  qr_flutter: ^4.1.0
  file_picker: ^11.0.2
  audioplayers: ^6.6.0
  proximity_sensor: ^1.3.10
  incoming_call_kit: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/events/
    - assets/clubs/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

