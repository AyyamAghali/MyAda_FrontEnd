name: myada_official
description: MyADA Official App - Digital Student ID and Attendance System.

# Prevent accidental publishing to pub.dev
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.0.5
  get: ^4.6.5
  
  # UI utilities
  flutter_screenutil: ^5.9.0
  smooth_page_indicator: ^1.1.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.7
  
  # Storage
  shared_preferences: ^2.2.1
  
  # Network
  http: ^1.3.0
  dio: ^5.3.2
  
  # Others
  intl: ^0.18.1
  calendar_date_picker2: ^1.0.0
  connectivity_plus: ^4.0.0
  flutter_datetime_picker_plus: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/
    - lib/assets/
    
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
